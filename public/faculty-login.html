<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login - SmartCampus</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 100px auto 50px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #cbd5e1; font-size: 0.9em; margin-bottom: 8px; font-weight: 500; }
        .input-group input { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: #f8fafc; font-size: 1em; outline: none; transition: all 0.3s ease; }
        .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); background: rgba(0, 0, 0, 0.6); }
        .submit-btn { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
        .submit-btn:hover { background: #2563eb; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); transform: translateY(-2px); }
        #errorMsg { display: none; background: rgba(225, 29, 72, 0.1); border: 1px solid rgba(225, 29, 72, 0.4); color: #fda4af; padding: 12px; border-radius: 8px; margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body style="position: relative; min-height: 100vh; overflow-y: auto; background: linear-gradient(-45deg, #0f172a, #0c4a6e, #0f172a);">

    <div class="orb orb-1" style="background: #3b82f6;"></div>
    <div class="orb orb-2" style="background: #0ea5e9;"></div>

    <button class="back-circle-btn" onclick="window.location.href='index.html'" title="Back to Home" style="position: absolute; top: 25px; left: 25px; z-index: 100;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </button>

    <div class="container slide-in" style="position: relative; z-index: 10;">
        <div class="login-container">
            <div style="font-size: 3.5em; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(59,130,246,0.6));">👨‍🏫</div>
            <h2 style="color: #f8fafc; margin-bottom: 5px; font-size: 1.8em;">Faculty Portal</h2>
            <p style="color: #94a3b8; margin-bottom: 30px; font-size: 0.95em;">Login to manage your department and classes.</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Faculty Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">Secure Login &rarr;</button>
                <div id="errorMsg">Invalid Username or Password.</div>
            </form>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
